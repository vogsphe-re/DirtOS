openapi: "3.1.0"

info:
  title: DirtOS REST API
  version: "1"
  description: |
    Local REST API embedded in the DirtOS desktop application.
    Intended for plugin development and 3rd-party integrations (n8n, Home Assistant, scripts, etc.).

    **Base URL:** `http://127.0.0.1:7272`
    Override the port with the `DIRTOS_API_PORT` environment variable before launching DirtOS.

    All endpoints return JSON. Timestamps are ISO 8601 strings in UTC.
    Enum values are lowercase snake_case strings unless noted otherwise.

servers:
  - url: http://127.0.0.1:7272
    description: DirtOS local API (default port)

tags:
  - name: Health
    description: Application health check
  - name: Environments
    description: Garden environments (outdoor plots, indoor grow spaces, etc.)
  - name: Locations
    description: Named locations within an environment (sites, beds, groups, spaces, tents, pots, trays)
  - name: Species
    description: Plant species catalog
  - name: Plants
    description: Individual plant instances
  - name: Schedules
    description: Recurring care schedules (watering, feeding, maintenance)
  - name: Sensors
    description: Environmental and soil sensors
  - name: Issues
    description: Problem tracking and workflow
  - name: Journal
    description: Timestamped garden journal entries
  - name: Harvests
    description: Harvest records linked to plants

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Application is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "0.4.0"

  # ---------------------------------------------------------------------------
  # Environments
  # ---------------------------------------------------------------------------
  /api/v1/environments:
    get:
      tags: [Environments]
      summary: List environments
      operationId: listEnvironments
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: List of environments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Environment"
    post:
      tags: [Environments]
      summary: Create an environment
      operationId: createEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewEnvironment"
      responses:
