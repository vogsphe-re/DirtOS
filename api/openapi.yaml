# ===========================================================================
# Components
# ===========================================================================
components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

    environment_id:
      name: environment_id
      in: query
      required: true
      schema:
        type: integer
        format: int64
      description: Filter results to a specific environment

    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 100
      description: Maximum number of records to return

    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
      description: Number of records to skip (for pagination)

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: not found

  schemas:
    # -------------------------------------------------------------------------
    # Environment
    # -------------------------------------------------------------------------
    Environment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        elevation_m:
          type: number
          nullable: true
        timezone:
          type: string
          nullable: true
        climate_zone:
          type: string
          nullable: true
        asset_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NewEnvironment:
      type: object
      required: [name]
      properties:
        name:
          type: string
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        elevation_m:
          type: number
          nullable: true
        timezone:
          type: string
          nullable: true
        climate_zone:
          type: string
          nullable: true

    UpdateEnvironment:
      type: object
      properties:
        name:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        elevation_m:
          type: number
          nullable: true
        timezone:
          type: string
          nullable: true
        climate_zone:
          type: string
          nullable: true

    # -------------------------------------------------------------------------
    # Location
    # -------------------------------------------------------------------------
    LocationType:
      type: string
      description: Location enum serialized by the backend.
      enum: [Plot, Space, Tent, Tray, Pot, Shed, OutdoorSite, IndoorSite, PlotGroup, SeedlingArea]

    Location:
      type: object
      properties:
        id:
          type: integer
          format: int64
        environment_id:
          type: integer
          format: int64
        parent_id:
          type: integer
          format: int64
          nullable: true
        location_type:
          $ref: "#/components/schemas/LocationType"
        name:
          type: string
        label:
          type: string
          nullable: true
        position_x:
          type: number
          nullable: true
        position_y:
          type: number
          nullable: true
        width:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        canvas_data_json:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        asset_id:
          type: string
          nullable: true
        grid_rows:
          type: integer
          format: int64
          nullable: true
        grid_cols:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NewLocation:
      type: object
      required: [environment_id, location_type, name]
      properties:
        environment_id:
          type: integer
          format: int64
        parent_id:
          type: integer
          format: int64
          nullable: true
        location_type:
          $ref: "#/components/schemas/LocationType"
        name:
          type: string
        label:
          type: string
          nullable: true
        position_x:
          type: number
          nullable: true
        position_y:
          type: number
          nullable: true
        width:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        canvas_data_json:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        grid_rows:
          type: integer
          format: int64
          nullable: true
        grid_cols:
          type: integer
          format: int64
          nullable: true

    UpdateLocation:
      type: object
      properties:
        parent_id:
          type: integer
          format: int64
          nullable: true
        location_type:
          $ref: "#/components/schemas/LocationType"
        name:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
        position_x:
          type: number
          nullable: true
        position_y:
          type: number
          nullable: true
        width:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        canvas_data_json:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        grid_rows:
          type: integer
          format: int64
          nullable: true
        grid_cols:
          type: integer
          format: int64
          nullable: true

    # -------------------------------------------------------------------------
    # Species
    # -------------------------------------------------------------------------
    Species:
      type: object
      properties:
        id:
