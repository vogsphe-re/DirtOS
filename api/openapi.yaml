      tags: [Harvests]
      summary: List harvests in an environment
      operationId: listHarvests
      parameters:
        - $ref: "#/components/parameters/environment_id"
        - name: date_from
          in: query
          schema:
            type: string
            format: date
            example: "2026-01-01"
          description: Filter harvests on or after this date (YYYY-MM-DD)
        - name: date_to
          in: query
          schema:
            type: string
            format: date
            example: "2026-12-31"
          description: Filter harvests on or before this date (YYYY-MM-DD)
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
